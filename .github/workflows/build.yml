name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          pip install awscli
          VERSION=$(node -p "require('./package.json').version")
          DMG=$(ls dist/*.dmg | grep -v blockmap | head -1)
          aws s3 cp "$DMG" "s3://clinical-statistics-downloads/mac/Clinical-Statistics-${VERSION}.dmg" \
            --endpoint-url https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE and MSI to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE and MSI to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          pip install awscli
          $VERSION = (node -p "require('./package.json').version")
          $EXE = Get-ChildItem dist\*.exe | Where-Object { $_.Name -notlike "*.blockmap" } | Select-Object -First 1
          aws s3 cp $EXE.FullName "s3://clinical-statistics-downloads/win/Clinical-Statistics-$VERSION.exe" `
            --endpoint-url https://$env:CF_ACCOUNT_ID.r2.cloudflarestorage.com
          $MSI = Get-ChildItem dist\*.msi | Where-Object { $_.Name -notlike "*.blockmap" } | Select-Object -First 1
          aws s3 cp $MSI.FullName "s3://clinical-statistics-downloads/win/Clinical-Statistics-$VERSION.msi" `
            --endpoint-url https://$env:CF_ACCOUNT_ID.r2.cloudflarestorage.com

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="beakerLiquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:0.85" />
    </linearGradient>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="185" rx="50" ry="8" fill="#374151" opacity="0.2"/>
  
  <!-- Beaker body -->
  <path d="M 60 50 L 65 170 Q 65 180, 100 180 Q 135 180, 135 170 L 140 50 Z" 
        fill="#E5E7EB" opacity="0.6" stroke="#9CA3AF" stroke-width="2"/>
  
  <!-- Liquid inside -->
  <path d="M 66 110 L 68 170 Q 68 178, 100 178 Q 132 178, 132 170 L 134 110 Z" 
        fill="url(#beakerLiquid)"/>
  
  <!-- Liquid surface shine -->
  <ellipse cx="100" cy="110" rx="33" ry="4" fill="#93C5FD" opacity="0.6"/>
  
  <!-- Measurement lines -->
  <line x1="65" y1="80" x2="75" y2="80" stroke="#6B7280" stroke-width="1"/>
  <line x1="66" y1="110" x2="76" y2="110" stroke="#6B7280" stroke-width="1"/>
  <line x1="67" y1="140" x2="77" y2="140" stroke="#6B7280" stroke-width="1"/>
  
  <!-- Volume labels -->
  <text x="80" y="83" font-family="Arial" font-size="10" fill="#4B5563">200ml</text>
  <text x="80" y="113" font-family="Arial" font-size="10" fill="#4B5563">100ml</text>
  <text x="80" y="143" font-family="Arial" font-size="10" fill="#4B5563">50ml</text>
  
  <!-- Spout -->
  <path d="M 140 50 L 145 45 L 148 50" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="2"/>
  
  <!-- Rim -->
  <ellipse cx="100" cy="50" rx="40" ry="6" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="2"/>
  
  <!-- Bubbles in liquid -->
  <circle cx="85" cy="130" r="3" fill="white" opacity="0.4"/>
  <circle cx="110" cy="145" r="4" fill="white" opacity="0.3"/>
  <circle cx="95" cy="160" r="2.5" fill="white" opacity="0.5"/>
</svg>

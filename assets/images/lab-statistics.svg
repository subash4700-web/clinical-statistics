<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Chart background -->
  <rect x="20" y="20" width="160" height="140" rx="8" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Grid lines -->
  <line x1="20" y1="60" x2="180" y2="60" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="20" y1="100" x2="180" y2="100" stroke="#F3F4F6" stroke-width="1"/>
  <line x1="20" y1="140" x2="180" y2="140" stroke="#F3F4F6" stroke-width="1"/>
  
  <!-- Axes -->
  <line x1="35" y1="25" x2="35" y2="155" stroke="#4B5563" stroke-width="2"/>
  <line x1="35" y1="155" x2="175" y2="155" stroke="#4B5563" stroke-width="2"/>
  
  <!-- Bar chart bars -->
  <rect x="50" y="110" width="18" height="45" fill="url(#chartGrad)" rx="2"/>
  <rect x="80" y="85" width="18" height="70" fill="url(#chartGrad)" rx="2"/>
  <rect x="110" y="65" width="18" height="90" fill="url(#chartGrad)" rx="2"/>
  <rect x="140" y="95" width="18" height="60" fill="url(#chartGrad)" rx="2"/>
  
  <!-- Curve overlay -->
  <path d="M 50 120 Q 80 80, 110 50 T 155 90" 
        stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Data points on curve -->
  <circle cx="50" cy="120" r="4" fill="#10B981"/>
  <circle cx="80" cy="85" r="4" fill="#10B981"/>
  <circle cx="110" cy="50" r="4" fill="#10B981"/>
  <circle cx="155" cy="90" r="4" fill="#10B981"/>
  
  <!-- Statistical annotation -->
  <text x="100" y="185" font-family="Arial" font-size="12" fill="#6B7280" text-anchor="middle">p < 0.05</text>
</svg>

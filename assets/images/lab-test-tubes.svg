<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="liquid1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="liquid2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#065F46;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="liquid3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Test tube 1 (tallest) -->
  <rect x="35" y="50" width="25" height="120" rx="12" fill="#E5E7EB" opacity="0.5"/>
  <rect x="35" y="100" width="25" height="70" rx="0" fill="url(#liquid1)"/>
  <ellipse cx="47.5" cy="100" rx="12.5" ry="3" fill="#3B82F6" opacity="0.6"/>
  <rect x="42" y="40" width="11" height="12" rx="5" fill="#6B7280"/>
  
  <!-- Test tube 2 (medium) -->
  <rect x="87" y="70" width="25" height="100" rx="12" fill="#E5E7EB" opacity="0.5"/>
  <rect x="87" y="110" width="25" height="60" rx="0" fill="url(#liquid2)"/>
  <ellipse cx="99.5" cy="110" rx="12.5" ry="3" fill="#10B981" opacity="0.6"/>
  <rect x="94" y="60" width="11" height="12" rx="5" fill="#6B7280"/>
  
  <!-- Test tube 3 (shortest) -->
  <rect x="139" y="80" width="25" height="90" rx="12" fill="#E5E7EB" opacity="0.5"/>
  <rect x="139" y="130" width="25" height="40" rx="0" fill="url(#liquid3)"/>
  <ellipse cx="151.5" cy="130" rx="12.5" ry="3" fill="#F59E0B" opacity="0.6"/>
  <rect x="146" y="70" width="11" height="12" rx="5" fill="#6B7280"/>
  
  <!-- Rack -->
  <rect x="20" y="175" width="160" height="8" rx="4" fill="#4B5563"/>
  <rect x="30" y="170" width="10" height="10" rx="2" fill="#6B7280"/>
